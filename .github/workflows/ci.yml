name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # package.json pins the pnpm release used locally and in CI.
      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # No .nvmrc or engines field; adapter-vercel targets nodejs24.x.
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      # The check script builds @newscraft/shared before Svelte resolves its types.
      - name: Type-check
        run: corepack pnpm check

      # No secrets needed: app tests mock $env/dynamic/private and the db layer;
      # harness tests and eval:fixture run without API keys by design.
      - name: Unit tests
        run: corepack pnpm test

      - name: Golden-prompt eval (fixture mode)
        run: corepack pnpm eval:fixture
